<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelvetVeil - 私密精品成人用品店</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background: #fafafa; color: #333; }
        .container { max-width: 960px; margin: 40px auto; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: #8B008D; margin: 0; }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-4px); }
        .product-img { width: 100%; height: 180px; object-fit: cover; }
        .product-info { padding: 16px; }
        .product-info h3 { margin-top: 0; color: #5D3A6B; }
        .price { font-weight: bold; color: #C2185B; margin: 8px 0; }
        .btn { display: block; width: 100%; padding: 12px; background: #9C27B0; color: white; border: none; text-align: center; text-decoration: none; font-weight: 500; }
        .btn:hover { background: #7B1FA2; }
        footer { text-align: center; margin-top: 40px; color: #777; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>VelvetVeil</h1>
            <p>私密精品成人用品店 - 优雅·舒适·安全</p>
        </header>
        <section class="products">
            <!-- Product cards will be added dynamically or statically -->
            <div class="product-card">
                <img class="product-img" src="https://via.placeholder.com/400x300?text=Silk+Robe" alt="丝质睡袍">
                <div class="product-info">
                    <h3>丝质睡袍</h3>
                    <p class="price">¥299</p>
                    <p>轻柔丝绸，修身剪裁，提升私密时光的仪式感。</p>
                    <a href="#" class="btn">立即购买</a>
                </div>
            </div>
            <div class="product-card">
                <img class="product-img" src="https://via.placeholder.com/400x300?text=Massage+Oil" alt="按摩精油">
                <div class="product-info">
                    <h3>天然按摩精油</h3>
                    <p class="price">¥168</p>
                    <p>薰衣草与甜杏仁油混合，舒缓肌肉，增进亲密感。</p>
                    <a href="#" class="btn">立即购买</a>
                </div>
            </div>
            <div class="product-card">
                <img class="product-img" src="https://via.placeholder.com/400x300?text=Silk+Blindfold" alt="丝绸眼罩">
                <div class="product-info">
                    <h3>蒙眼丝绸眼罩</h3>
                    <p class="price">¥88</p>
                    <p>柔软遮光，增加神秘感与期待。</p>
                    <a href="#" class="btn">立即购买</a>
                </div>
            </div>
        </section>
        <footer>
            <p>© 2026 VelvetVeil. 隐私保密发货，全国包邮。</p>
        </footer>
    </div>
</body>
</html>
